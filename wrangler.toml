name = "allbets-mcp"
main = "src/worker.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Custom Domains auto-provision DNS + TLS cert (vs. plain routes which require manual DNS)
routes = [
  { pattern = "allbets.dev", custom_domain = true },
]

# Keep the workers.dev URL alive for fallback / debugging
workers_dev = true
preview_urls = true

[observability]
enabled = true

# Workers AI: Llama-3.3-70b for pm_recommend topic extraction (admin@allbets.dev account, free tier)
[ai]
binding = "AI"

# Cloudflare Agents SDK — RecommendAgent owns URL→recommendations pipeline with persisted state
[[durable_objects.bindings]]
name = "RecommendAgent"
class_name = "RecommendAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RecommendAgent"]
